name = "pks-aspire-coolify"
schema-version = "1"
checklist-in-gitignore = true

[product]
# responsibility — single statement of what the product is and is not (FT-039)
responsibility = ""

[paths]
features = ".product/features"
adrs = ".product/adrs"
tests = ".product/tests"
graph = ".product/graph"
checklist = ".product/checklist.md"
dependencies = ".product/dependencies"
requests = ".product/requests.jsonl"
prompts = ".product/prompts"
gaps = ".product/gaps.json"

[prefixes]
feature = "FT"
adr = "ADR"
test = "TC"

[phases]
1 = "Phase 1"

[domains]
"coolify-api" = "Typed HTTP client over Coolify REST API (destinations, projects, environments, services, env vars, deploy actions)"
"aspire-publisher" = "Aspire publishing-pipeline hook: WithCoolifyDeploy extension and multi-phase publisher integrated with aspire deploy"
"resource-mapping" = "Translation from Aspire resource graph onto Coolify destination/project/environment/service hierarchy (v1: one AppHost = one project)"
"auth" = "Coolify API token discovery, storage, per-instance configuration (env var, user-secrets, Aspire parameter)"
"state" = "Local idempotency state: remember Coolify UUIDs for Aspire resources so re-deploys converge"
"image-flow" = "Building container images locally and pushing to a registry Coolify can pull from"
"secrets-env" = "Flowing Aspire parameters and connection strings into Coolify env vars at correct scope without leaking"
"apphost-ts" = "TypeScript AppHost parity via aspire restore generated-module convention"
"managed-dashboard" = "Optional coolify-aspiredashboard container (Aspire dashboard + Coolify resource provider) deployed into the project"

[mcp]
write = false
port = 7777

[author]
cli = "claude"

# FT-055 / ADR-047 — feature body completeness check (W030).
# Defaults are listed explicitly to future-proof against changes upstream.
[features]
required-sections = ["Description", "Functional Specification", "Out of scope"]
functional-spec-subsections = ["Inputs", "Outputs", "State", "Behaviour", "Invariants", "Error handling", "Boundaries"]
required-from-phase = 1
completeness-severity = "warning"
